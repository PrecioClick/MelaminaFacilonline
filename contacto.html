<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contacto – Melamina Fácil</title>

<style>

/* GENERAL */
body{
margin:0;
padding-top:60px;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
}

.section{
padding:40px 0;
}

.titulo-seccion{
text-align:center;
color:#1E3A8A;
font-size:32px;
margin-bottom:10px;
font-weight:900;
}

.card{
background:#fff;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
}

/* LOGO */
.logo-container{
display:flex;
align-items:center;
gap:10px;
}

.logo-container img{
height:38px;
width:38px;
border-radius:50%;
background:#fff;
padding:4px;
object-fit:cover;
}

/* HEADER */
header{
background:#DC2626;
padding:15px 0px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* MENU NORMAL */
.nav-links a{
margin-left:15px;
text-decoration:none;
color:#fff;
font-size:14px;
font-weight:bold;
}

.nav-links a.activo{
background:#fff;
color:#DC2626;
padding:6px 10px;
border-radius:6px;
}
  
/* HAMBURGUESA */
.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
color:#fff;
}

/* MENU TARJETA */
.mobile-menu{
position:absolute;
top:70px;
right:20px;
width:260px;
background:#fff;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
display:none;
flex-direction:column;
padding:15px;
z-index:3000;
}

.mobile-menu a{
display:flex;
align-items:center;
gap:10px;
padding:10px;
text-decoration:none;
color:#000;
border-radius:8px;
font-size:15px;
}

.mobile-menu a:hover{
background:#f2f2f2;
}

.mobile-menu a.activo{
background:#81D8D0;
font-weight:bold;
}

@media(max-width:768px){
.nav-links{ display:none; }
.menu-toggle{ display:block; }
}

/* FORMULARIO */
form input,
form textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

form textarea{
resize:none;
}

/* BOTON */
.btn{
background:#28a745; /* verde WhatsApp */
color:#fff;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
width:100%;
transition:.3s;
}

.btn:hover{
opacity:.85;
}

/* FOOTER */
footer{
background:#111;
color:#fff;
padding:20px 0;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<div class="container">
<nav style="display:flex;justify-content:space-between;align-items:center;">

<div class="logo-container">
<img src="https://res.cloudinary.com/dy0bpqylb/image/upload/v1772170669/Whisk_64ff7a55c55a248a9dd4c314604cba6cdr_disia0.png">
<strong style="font-size:18px; color:#fff;">Melamina Fácil</strong>
</div>

<div class="menu-toggle" onclick="toggleMenu(event)">☰</div>

<div class="nav-links">
<a href="curso.html">Curso</a>
<a href="cortes.html">Tipos de Corte</a>
<a href="herramientas.html">Herramientas</a>
<a href="disenos.html">Diseños Premium</a>
<a href="contacto.html" class="activo">Contacto</a>
<a href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
</div>

</nav>
</div>

<div class="mobile-menu" id="mobileMenu">
<a href="curso.html">📘 Curso</a>
<a href="cortes.html">🪚 Tipos De Corte</a>
<a href="herramientas.html">🛠 Herramientas</a>
<a href="disenos.html">📐 Diseños Premium</a>
<a href="contacto.html" class="activo">📱 Contacto</a>
<a href="#">❌ Cerrar Sesión</a>
</div>
</header>

<main>
<section class="section">
<div class="container" style="max-width:520px">

<div class="card">

<h1 class="titulo-seccion"">Contacto</h1>
<p style="text-align:center;">Escríbenos y te respondemos por WhatsApp.</p>

<form onsubmit="enviarWhatsApp(event,this)">

<p>
<label>Nombre<br>
<input type="text" id="nombre" required>
</label>
</p>

<p>
<label>Email<br>
<input type="email" id="email" required>
</label>
</p>

<p>
<label>Mensaje<br>
<textarea id="mensaje" rows="5" required></textarea>
</label>
</p>

<p>
<button class="btn" type="submit">Enviar Mensaje</button>
</p>

</form>

</div>

</div>
</section>
</main>

<footer>
<div class="container">© 2026 Melamina Fácil</div>
</footer>

<script>

if (!localStorage.getItem("acceso")) {
  window.location.href = "index.html";
}

let menu = document.getElementById("mobileMenu");

function toggleMenu(e){
e.stopPropagation();
menu.style.display = menu.style.display==="flex" ? "none" : "flex";
}

document.addEventListener("click",function(e){
if(menu.style.display==="flex" && !menu.contains(e.target) && !e.target.classList.contains("menu-toggle")){
menu.style.display="none";
}
});

window.addEventListener("scroll",function(){
if(menu.style.display==="flex"){
menu.style.display="none";
}
});

/* WHATSAPP + RESET */
function enviarWhatsApp(e,form){
e.preventDefault();

const nombre = document.getElementById("nombre").value;
const email = document.getElementById("email").value;
const mensaje = document.getElementById("mensaje").value;

const texto = `Hola, soy ${nombre}%0AEmail: ${email}%0AMensaje: ${mensaje}`;
const url = `https://wa.me/51955267888?text=${texto}`;

window.open(url, "_blank");

form.reset();
}

function cerrarSesion(){
  localStorage.removeItem("acceso");
  window.location.href = "index.html";
}

</script>

</body>
</html>
